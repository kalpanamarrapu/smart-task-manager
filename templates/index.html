<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* TOP TIME BAR */
    .top-bar {
      position: absolute;
      top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 36px;
      color: #333;
    }

    /* DASHBOARD GRID */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 220px);
      gap: 30px;
    }

    .card {
      height: 160px;
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: scale(1.08);
    }

    /* COLORS */
    .study { background: #7aa2f7; }
    .tasks { background: #86efac; color: #065f46; }
    .calendar { background: #fcd34d; color: #92400e; }
    .notes { background: #f9a8d4; color: #831843; }

  </style>
</head>
<body>

<!-- TIME AT TOP -->
<div class="top-bar">
  <p id="datetime"></p>
</div>

<h1>Dashboard</h1>

<div class="dashboard">

  <div class="card study" onclick="location.href='/study'">
    📚 Study
  </div>

  <div class="card tasks" onclick="location.href='/tasks'">
    ✅ Tasks
  </div>

  <div class="card calendar" onclick="location.href='/calendar'">
    📅 Calendar
  </div>

  <div class="card notes" onclick="location.href='/notes'">
    📝 Notes
  </div>

</div>

<script>
  function updateTime() {
    const now = new Date();

    const date = now.toLocaleDateString();
    const time = now.toLocaleTimeString();

    document.getElementById("datetime").innerText =
      date + "  |  " + time;
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>
